name: PR title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        shell: pwsh
        run: |
          $pattern = '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9-]+\))?!?: .+'
          if ($env:TITLE -notmatch $pattern) {
            Write-Error 'PR title must follow Conventional Commits.'
          }
