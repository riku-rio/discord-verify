name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  node:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm build
      - run: pnpm pack:check
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: node-failure-${{ matrix.os }}-${{ matrix.node }}
          path: |
            coverage
            **/*.log
          if-no-files-found: ignore

  python:
    name: Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --dev --frozen
      - run: uv run ruff check python tests/python
      - run: uv run mypy python
      - run: uv run pytest
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: python-failure-${{ matrix.os }}-${{ matrix.python }}
          path: |
            .pytest_cache
            .coverage
          if-no-files-found: ignore
