[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "discord-verify-adapter-bridge"
version = "0.1.0"
description = "Embedded Python worker bridge for the Discord Verify npm adapter package."
requires-python = ">=3.10,<3.14"
license = { text = "MIT" }
authors = [{ name = "Discord Verify contributors" }]
dependencies = []

[project.optional-dependencies]
dev = [
  "mypy>=1.15,<2",
  "pytest>=8,<10",
  "pytest-cov>=6,<8",
  "ruff>=0.12,<1",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "--strict-config --strict-markers --cov=discord_verify_adapter --cov-report=term-missing --cov-report=xml:.artifacts/python-coverage.xml"
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["B", "E", "F", "I", "S", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]

[tool.mypy]
python_version = "3.10"
strict = true
files = ["src"]
warn_unreachable = true
